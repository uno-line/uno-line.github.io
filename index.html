<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Архітектор — Фабрика мікрододатків</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Стиль для приховування дефолтного скролбару у списку додатків */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 h-[100dvh] flex flex-col font-sans text-gray-900 overflow-hidden relative">

    <header class="flex-shrink-0 bg-white shadow-sm px-4 py-3 flex justify-between items-center relative z-10">
        <button id="btn-settings" class="p-2 text-gray-600 hover:text-indigo-600 transition-colors rounded-full hover:bg-indigo-50">
            <i class="ph ph-gear text-2xl"></i>
        </button>
        <h1 class="absolute left-1/2 transform -translate-x-1/2 text-xl font-bold text-gray-800 tracking-wide">
            Архітектор
        </h1>
        <button id="btn-export-all" class="p-2 text-gray-600 hover:text-green-600 transition-colors rounded-full hover:bg-green-50">
            <i class="ph ph-floppy-disk text-2xl"></i>
        </button>
    </header>

    <main class="flex-grow overflow-y-auto p-4 no-scrollbar" id="apps-container">
        <div class="flex flex-col items-center justify-center h-full text-gray-400">
            <i class="ph ph-squares-four text-4xl mb-2"></i>
            <p class="text-sm">У вас ще немає згенерованих додатків</p>
        </div>
    </main>

    <footer class="flex-shrink-0 bg-white border-t border-gray-200 p-3 pb-safe z-10">
        <div class="flex gap-2 items-end max-w-3xl mx-auto">
            <textarea id="main-prompt" rows="1" 
                class="w-full bg-gray-100 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none overflow-hidden transition-all text-sm" 
                placeholder="Опишіть додаток (напр., Калькулятор калорій...)"></textarea>
            
            <button id="btn-generate" class="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 transition-colors flex-shrink-0 shadow-md">
                <i class="ph ph-magic-wand text-xl"></i>
            </button>
        </div>
    </footer>

    <div id="modal-settings" class="fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl w-full max-w-md p-6 space-y-4 shadow-xl">
            <div class="flex justify-between items-center border-b border-gray-100 pb-3">
                <h2 class="text-lg font-bold text-gray-900">Налаштування ШІ</h2>
                <button id="btn-close-settings" class="text-gray-400 hover:text-gray-600">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">GEMINI API KEY</label>
                    <input type="password" id="api-key" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="AIzaSy...">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">МОДЕЛЬ ГЕНЕРАЦІЇ</label>
                    <select id="api-model" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash (Рекомендовано)</option>
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro (Максимальна точність)</option>
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                    </select>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs font-semibold text-gray-500">ТЕМПЕРАТУРА: <span id="temp-value">0.7</span></label>
                    </div>
                    <input type="range" id="api-temp" min="0" max="2" step="0.1" value="0.7" class="w-full accent-indigo-600">
                </div>
            </div>

            <button id="btn-save-settings" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-medium hover:bg-indigo-700 transition-colors shadow-sm">
                Зберегти конфігурацію
            </button>
        </div>
    </div>

    <div id="preview-container" class="fixed inset-0 bg-gray-50 z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center border-b border-gray-200">
            <button id="btn-close-preview" class="p-2 text-gray-600 hover:bg-gray-100 rounded-full">
                <i class="ph ph-arrow-left text-xl font-bold"></i>
            </button>
            <h2 id="preview-title" class="text-sm font-bold text-gray-800 tracking-wide truncate max-w-[200px]">Прев'ю</h2>
            <div class="w-9 h-9"></div> </header>
        <iframe id="app-iframe" class="w-full flex-grow border-none bg-transparent"></iframe>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
