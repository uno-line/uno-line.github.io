<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <!-- Налаштування для коректного відображення на мобільних пристроях -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="./manifest.json">
    <title>Архітектор</title>
    
    <!-- Підключення Tailwind CSS (CDN версія для статичного хостингу) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Підключення іконок Phosphor Icons (сучасний і легкий набір) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Базові стилі для плавних переходів та скролу -->
    <style>
        /* Ховаємо скролбар, але залишаємо можливість скролити */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Плавна поява модальних вікон */
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.2s ease-out; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans text-gray-900 overflow-hidden relative">

    <!-- Хедер застосунку -->
    <!-- flex-shrink-0 гарантує, що хедер не стиснеться при появі контенту -->
    <header class="flex-shrink-0 bg-white shadow-sm px-4 py-3 flex justify-between items-center relative z-10">
        <!-- Кнопка налаштувань (зліва) -->
        <button id="btn-settings" class="p-2 text-gray-600 hover:text-indigo-600 transition-colors rounded-full hover:bg-indigo-50">
            <i class="ph ph-gear text-2xl"></i>
        </button>

        <!-- Абсолютно центрований заголовок -->
        <h1 class="absolute left-1/2 transform -translate-x-1/2 text-xl font-bold text-gray-800 tracking-wide">
            Архітектор
        </h1>

        <!-- Кнопка збереження/експорту (справа) у вигляді дискети -->
        <button id="btn-export-all" class="p-2 text-gray-600 hover:text-green-600 transition-colors rounded-full hover:bg-green-50">
            <i class="ph ph-floppy-disk text-2xl"></i>
        </button>
    </header>

    <!-- Головна робоча область (сітка згенерованих додатків) -->
    <!-- overflow-y-auto дозволяє скролити список додатків -->
    <main class="flex-grow overflow-y-auto p-4 no-scrollbar pb-24" id="apps-container">
        <!-- Тут JS буде рендерити картки додатків. Поки що залишимо заглушку -->
        <div class="flex flex-col items-center justify-center h-full text-gray-400">
            <i class="ph ph-squares-four text-4xl mb-2"></i>
            <p class="text-sm">У вас ще немає згенерованих додатків</p>
        </div>
    </main>

    <!-- Нижня панель для введення основного промпту -->
    <!-- Фіксується внизу екрана -->
    <footer class="absolute bottom-0 w-full bg-white border-t border-gray-200 p-3 pb-safe z-10">
        <div class="flex gap-2 items-end max-w-3xl mx-auto">
            <!-- Текстова область, яка автоматично змінюватиме висоту -->
            <textarea id="main-prompt" rows="1" 
                class="w-full bg-gray-100 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none overflow-hidden transition-all text-sm" 
                placeholder="Опишіть додаток (напр., Калькулятор калорій...)"></textarea>
            
            <button id="btn-generate" class="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 transition-colors flex-shrink-0 shadow-md">
                <i class="ph ph-magic-wand text-xl"></i>
            </button>
        </div>
    </footer>

    <!-- Модальне вікно: Налаштування (за замовчуванням сховане - hidden) -->
    <div id="modal-settings" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-end sm:items-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-6 transform transition-all">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-lg font-bold">Налаштування API</h2>
                <button id="btn-close-settings" class="text-gray-400 hover:text-gray-700">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>

            <!-- Форма налаштувань -->
            <div class="space-y-4">
                <!-- Ключ API -->
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Gemini API Key</label>
                    <input type="password" id="api-key" placeholder="AIzaSy..." 
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>

                <!-- Вибір моделі -->
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Модель</label>
                    <select id="api-model" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                        <option value="gemini-3.0-flash-preview">Default (Gemini 3 Flash Preview)</option>
                        <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
                        <option value="gemini-3.0-flash-preview">Gemini 3 Flash Preview</option>
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
                        <option value="gemini-pro">Gemini Pro Latest</option>
                        <option value="gemini-flash">Gemini Flash Latest</option>
                        <option value="gemini-flash-lite">Gemini Flash-Lite Latest</option>
                    </select>
                </div>

                <!-- Температура -->
                <div>
                    <div class="flex justify-between">
                        <label class="block text-xs font-medium text-gray-500 mb-1">Температура (креативність)</label>
                        <span id="temp-value" class="text-xs font-bold text-indigo-600">0.7</span>
                    </div>
                    <input type="range" id="api-temp" min="0" max="2" step="0.1" value="0.7" 
                        class="w-full accent-indigo-600">
                </div>
                
                <button id="btn-save-settings" class="w-full bg-gray-900 text-white rounded-lg py-2.5 text-sm font-medium mt-2 hover:bg-black transition-colors">
                    Зберегти налаштування
                </button>
            </div>
        </div>
    </div>

    <!-- Модальне вікно/Бічна панель для прев'ю згенерованого додатка (сховане) -->
    <!-- translate-x-full ховає його за правий край екрана -->
    <div id="preview-container" class="fixed inset-0 bg-white z-40 transform translate-x-full transition-transform duration-300 flex flex-col">
        <header class="bg-gray-50 border-b border-gray-200 px-4 py-2 flex justify-between items-center flex-shrink-0">
            <div class="flex items-center gap-2">
                <button id="btn-close-preview" class="p-2 text-gray-600 hover:bg-gray-200 rounded-full">
                    <i class="ph ph-arrow-left text-xl"></i>
                </button>
                <h2 id="preview-title" class="text-sm font-bold truncate max-w-[200px]">Назва додатка</h2>
            </div>
            <div class="flex gap-2">
                <button class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-full" title="Редагувати">
                    <i class="ph ph-pencil-simple text-xl"></i>
                </button>
                <button class="p-2 text-green-600 hover:bg-green-50 rounded-full" title="Встановити як PWA">
                    <i class="ph ph-download-simple text-xl"></i>
                </button>
            </div>
        </header>
        <!-- iframe для ізольованого запуску коду -->
        <iframe id="app-iframe" class="flex-grow w-full border-none bg-white"></iframe>
    </div>

    <!-- Точки входу для наших JS модулів -->
    <!-- Підключимо їх як type="module", щоб використовувати import/export -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
