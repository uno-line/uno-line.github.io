<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO | Світ Простих Речей</title>
    <link rel="stylesheet" href="simple-style.css">
    <style>
        body { background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1600&auto=format&fit=crop'); }
        
        .hub-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .hub-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            display: flex;
            align-items: center; /* Центрування іконки та тексту по вертикалі */
            gap: 20px; /* Трохи збільшив відступ */
        }

        .hub-card:hover {
            background: rgba(77, 163, 255, 0.1);
            border-color: var(--accent-color);
        }

        .hub-icon { 
            font-size: 24px; 
            width: 30px; /* Фіксована ширина для іконки */
            text-align: center; /* Центрування самої іконки всередині блоку */
            flex-shrink: 0; /* Щоб іконка не стискалася */
        }

        .hub-info { 
            text-align: left; 
            flex: 1; /* Текстовий блок займає весь залишок місця */
        }

        .hub-name { display: block; font-weight: bold; color: var(--accent-color); }
        .hub-desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; }
    </style>
</head>
<body>

    <div class="simple-container">
        <h1 class="brand-name">UNO</h1>
        <p class="simple-subtitle" style="margin-bottom: 30px;">Екосистема простих інструментів</p>

        <div class="hub-grid">
            <a href="ipn/" class="hub-card">
                <div class="hub-icon">🔍</div>
                <div class="hub-info">
                    <span class="hub-name">ІПН Декодер</span>
                    <span class="hub-desc">Дата народження, вік та стать з податкового номера</span>
                </div>
            </a>

            <a href="calc/" class="hub-card">
                <div class="hub-icon">🔢</div> <div class="hub-info">
                    <span class="hub-name">Калькулятор</span>
                    <span class="hub-desc">Звичайний та інженерний режими</span>
                </div>
            </a>

            <a href="#" class="hub-card" style="opacity: 0.5;">
                <div class="hub-icon">⚙️</div>
                <div class="hub-info">
                    <span class="hub-name">Новий проект</span>
                    <span class="hub-desc">Незабаром з'явиться...</span>
                </div>
            </a>
        </div>
    </div>

    </body>
</html>
