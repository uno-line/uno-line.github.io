<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO | Калькулятор</title>
    <link rel="stylesheet" href="../simple-style.css">
    <style>
        body { 
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), 
                              url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1600&auto=format&fit=crop'); 
        }

        .calc-display {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 20px; margin-bottom: 20px; text-align: right;
            font-size: 24px; color: var(--accent-color); min-height: 70px; word-wrap: break-word;
            box-sizing: border-box;
        }

        .mode-switch { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .mode-btn { cursor: pointer; color: var(--text-dim); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; border-bottom: 2px solid transparent; padding-bottom: 5px; }
        .mode-btn.active { color: var(--accent-color); border-bottom-color: var(--accent-color); }

        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 20px 10px; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.2s; outline: none; }
        .calc-btn:active { background: var(--accent-color); color: #000; }
        .btn-op { color: var(--accent-color); font-weight: bold; }
        
        .eng-panel { display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
        .eng-panel.active { display: grid; }
    </style>
</head>
<body>

    <a href="../" class="home-link">
        <div class="home-icon">🏠</div>
    </a>

    <div class="top-menu">
        <div class="menu-icon">☰</div>
        <div class="menu-list">
            <a href="index.html">Оновити сторінку</a>
            <a href="../" style="color:var(--accent-color)">Повернутись до UNO</a>
        </div>
    </div>

    <div class="simple-container">
        <h1 class="brand-name">UNO</h1>
        <h2 class="tool-name">Калькулятор</h2>

        <div class="mode-switch">
            <span id="btnStd" class="mode-btn active" onclick="setMode('std')">Звичайний</span>
            <span id="btnEng" class="mode-btn" onclick="setMode('eng')">Інженерний</span>
        </div>

        <div id="display" class="calc-display">0</div>

        <div id="engPanel" class="eng-panel">
            <button class="calc-btn btn-op" onclick="add('Math.sin(')">sin</button>
            <button class="calc-btn btn-op" onclick="add('Math.cos(')">cos</button>
            <button class="calc-btn btn-op" onclick="add('Math.PI')">π</button>
            <button class="calc-btn btn-op" onclick="add('**')">^</button>
            <button class="calc-btn btn-op" onclick="add('Math.sqrt(')">√</button>
            <button class="calc-btn btn-op" onclick="add('Math.log(')">ln</button>
            <button class="calc-btn btn-op" onclick="add('(')">(</button>
            <button class="calc-btn btn-op" onclick="add(')')">)</button>
        </div>

        <div class="calc-grid">
            <button class="calc-btn" style="color:var(--error-color)" onclick="clr()">C</button>
            <button class="calc-btn" onclick="back()">←</button>
            <button class="calc-btn btn-op" onclick="add('/')">/</button>
            <button class="calc-btn btn-op" onclick="add('*')">×</button>

            <button class="calc-btn" onclick="add('7')">7</button>
            <button class="calc-btn" onclick="add('8')">8</button>
            <button class="calc-btn" onclick="add('9')">9</button>
            <button class="calc-btn btn-op" onclick="add('-')">-</button>

            <button class="calc-btn" onclick="add('4')">4</button>
            <button class="calc-btn" onclick="add('5')">5</button>
            <button class="calc-btn" onclick="add('6')">6</button>
            <button class="calc-btn btn-op" onclick="add('+')">+</button>

            <button class="calc-btn" onclick="add('1')">1</button>
            <button class="calc-btn" onclick="add('2')">2</button>
            <button class="calc-btn" onclick="add('3')">3</button>
            <button class="calc-btn" onclick="calculate()" style="grid-row: span 2; background:var(--accent-color); color:#000">=</button>

            <button class="calc-btn" style="grid-column: span 2;" onclick="add('0')">0</button>
            <button class="calc-btn" onclick="add('.')">.</button>
        </div>
    </div>

    <div class="simple-footer">
        <div class="footer-icon" onclick="showModal('info')">❓</div>
        <div class="footer-icon" onclick="showModal('contact')">✉️</div>
    </div>

    <div id="modalInfo" class="modal-info">
        <p>Універсальний калькулятор з підтримкою базових та інженерних функцій. Обчислення виконуються миттєво.</p>
        <button class="modal-close" onclick="closeModal()">Закрити</button>
    </div>

    <div id="modalContact" class="modal-info">
        <p>Частина проекту <strong>UNO</strong>.<br><br>Для зауважень та пропозицій звертайтесь:<br>burkotun.uno@gmail.com</p>
        <button class="modal-close" onclick="closeModal()">Закрити</button>
    </div>

    <script>
        // --- Управління інтерфейсом (як в ІПН) ---
        function showModal(type) {
            closeModal(); 
            if(type === 'info') document.getElementById('modalInfo').style.display = 'block';
            if(type === 'contact') document.getElementById('modalContact').style.display = 'block';
        }

        function closeModal() {
            document.querySelectorAll('.modal-info').forEach(m => m.style.display = 'none');
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal-info')) closeModal();
        }

        function setMode(m) {
            const engPanel = document.getElementById('engPanel');
            const btnStd = document.getElementById('btnStd');
            const btnEng = document.getElementById('btnEng');
            if(m === 'eng') {
                engPanel.classList.add('active'); btnEng.classList.add('active'); btnStd.classList.remove('active');
            } else {
                engPanel.classList.remove('active'); btnStd.classList.add('active'); btnEng.classList.remove('active');
            }
        }

        // --- Логіка Калькулятора ---
        let expr = "0";
        const disp = document.getElementById('display');

        function add(v) {
            if (expr === "0" && v !== '.') expr = v;
            else expr += v;
            update();
        }

        function clr() { expr = "0"; update(); }
        
        function back() {
            expr = expr.length > 1 ? expr.slice(0, -1) : "0";
            update();
        }

        function update() {
            disp.innerText = expr.replace(/Math\./g, '').replace(/\*\*/g, '^');
        }

        function calculate() {
            try {
                let res = eval(expr);
                if (!Number.isInteger(res)) res = Math.round(res * 1000000) / 1000000;
                expr = res.toString();
                update();
            } catch (e) {
                disp.innerText = "Помилка";
                expr = "0";
            }
        }
    </script>
</body>
</html>
