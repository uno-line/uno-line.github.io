<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO-LINE | Калькулятор</title>
    
    <!-- PWA Налаштування -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <link rel="stylesheet" href="../simple-style.css">
    <style>
        /* Блокування скролу та повний екран */
        html, body { 
            overflow: hidden; 
            height: 100%; 
            margin: 0; 
            padding: 0;
            background: #000;
            font-family: sans-serif; /* Гарантуємо чистий шрифт */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        /* Адаптація контейнера */
        .simple-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Рівномірний розподіл */
            padding: 10px 20px 20px 20px; /* Менший відступ зверху */
            box-sizing: border-box;
            position: relative;
        }

        /* --- НОВИЙ ШАПКА: Все в один рівень --- */
        .pwa-header {
            display: flex;
            justify-content: space-between;
            align-items: center; /* Вирівнювання по вертикалі */
            padding: 5px 0;
            margin-bottom: 5px;
        }

        /* Стилізація заголовка всередині шапки */
        .pwa-header .brand-name {
            font-size: 20px;
            margin: 0;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* Приховування навігації в режимі PWA */
        @media (display-mode: standalone) {
            .header-controls { display: none; }
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 22px;
            cursor: pointer;
            text-decoration: none;
            padding: 5px;
            line-height: 1;
        }

        /* --- РЕШТА СТИЛІВ --- */
        .tool-name {
            text-align: center;
            font-size: 16px;
            color: var(--text-dim);
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .calc-display {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 15px; margin-bottom: 10px; text-align: right;
            font-size: 32px; color: var(--accent-color); min-height: 70px; word-wrap: break-word;
            box-sizing: border-box;
            font-family: monospace; /* Для кращого відображення цифр */
        }

        .mode-switch { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .mode-btn { cursor: pointer; color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid transparent; padding-bottom: 2px; }
        .mode-btn.active { color: var(--accent-color); border-bottom-color: var(--accent-color); }

        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; flex-grow: 1; margin-bottom: 15px; }
        
        .calc-btn { 
            background: var(--card-bg); 
            border: 1px solid #333; /* Базовий контур */
            color: var(--text-main); 
            padding: 15px 5px; 
            border-radius: 8px; 
            font-size: 22px; 
            cursor: pointer; 
            transition: 0.1s; 
            outline: none; 
        }
        .calc-btn:active { background: var(--accent-color); color: #000; border-color: var(--accent-color); }
        .btn-op { color: var(--accent-color); font-weight: bold; border-color: #444; }
        
        .eng-panel { display: none; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
        .eng-panel.active { display: grid; }

        /* --- ОНОВЛЕНИЙ ФУТЕР: Контрастні кнопки --- */
        .footer-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: auto; /* Притискаємо до низу */
        }

        .footer-btn {
            background: #222; /* Контрастний фон */
            border: 2px solid var(--accent-color); /* Яскравий контур */
            border-radius: 8px;
            padding: 12px;
            color: #fff; /* Білий текст для максимального контрасту */
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        
        /* Розміри іконок та тексту всередині кнопок */
        .footer-btn-icon { font-size: 20px; }
        .footer-btn-text { font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .footer-btn:hover { background: var(--accent-color); color: #000; }
        .footer-btn:hover .mail-link { color: #000; }

        /* Стиль посилання в модальному вікні */
        .mail-link { color: var(--accent-color); text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

    <div class="simple-container">
        <!-- ОНОВЛЕНА ШАПКА: Назва та кнопки в один ряд -->
        <div class="pwa-header">
            <h1 class="brand-name">UNO-LINE</h1>
            <div class="header-controls">
                <a href="../" class="nav-btn" title="На головну">🏠</a>
                <button id="installBtn" class="nav-btn" title="Завантажити додаток" style="display:none;">💾</button>
            </div>
        </div>

        <h2 class="tool-name">Калькулятор</h2>

        <div id="display" class="calc-display">0</div>

        <div class="mode-switch">
            <span id="btnStd" class="mode-btn active" onclick="setMode('std')">Звичайний</span>
            <span id="btnEng" class="mode-btn" onclick="setMode('eng')">Інженерний</span>
        </div>

        <div id="engPanel" class="eng-panel">
            <button class="calc-btn btn-op" onclick="add('Math.sin(')">sin</button>
            <button class="calc-btn btn-op" onclick="add('Math.cos(')">cos</button>
            <button class="calc-btn btn-op" onclick="add('Math.PI')">π</button>
            <button class="calc-btn btn-op" onclick="add('**')">^</button>
            <button class="calc-btn btn-op" onclick="add('Math.sqrt(')">√</button>
            <button class="calc-btn btn-op" onclick="add('Math.log(')">ln</button>
            <button class="calc-btn btn-op" onclick="add('(')">(</button>
            <button class="calc-btn btn-op" onclick="add(')')">)</button>
        </div>

        <div class="calc-grid">
            <button class="calc-btn" style="color:var(--error-color); border-color: #633;" onclick="clr()">C</button>
            <button class="calc-btn" onclick="back()">←</button>
            <button class="calc-btn btn-op" onclick="add('/')">/</button>
            <button class="calc-btn btn-op" onclick="add('*')">×</button>

            <button class="calc-btn" onclick="add('7')">7</button>
            <button class="calc-btn" onclick="add('8')">8</button>
            <button class="calc-btn" onclick="add('9')">9</button>
            <button class="calc-btn btn-op" onclick="add('-')">-</button>

            <button class="calc-btn" onclick="add('4')">4</button>
            <button class="calc-btn" onclick="add('5')">5</button>
            <button class="calc-btn" onclick="add('6')">6</button>
            <button class="calc-btn btn-op" onclick="add('+')">+</button>

            <button class="calc-btn" onclick="add('1')">1</button>
            <button class="calc-btn" onclick="add('2')">2</button>
            <button class="calc-btn" onclick="add('3')">3</button>
            <button class="calc-btn" onclick="calculate()" style="grid-row: span 2; background:var(--accent-color); color:#000; border:none">=</button>

            <button class="calc-btn" style="grid-column: span 2;" onclick="add('0')">0</button>
            <button class="calc-btn" onclick="add('.')">.</button>
        </div>

        <!-- ОНОВЛЕНІ НИЖНІ КНОПКИ: З текстом та контрастом -->
        <div class="footer-controls">
            <div class="footer-btn" onclick="showModal('info')">
                <span class="footer-btn-icon">❓</span>
                <span class="footer-btn-text">Інфо</span>
            </div>
            <div class="footer-btn" onclick="showModal('contact')">
                <span class="footer-btn-icon">✉️</span>
                <span class="footer-btn-text">Пошта</span>
            </div>
        </div>
    </div>

    <!-- Модальні вікна -->
    <div id="modalInfo" class="modal-info">
        <p>Універсальний калькулятор з підтримкою базових та інженерних функцій. Працює офлайн як PWA додаток.</p>
        <button class="modal-close" onclick="closeModal()">Закрити</button>
    </div>

    <div id="modalContact" class="modal-info">
        <p>Частина проєкту <strong>UNO-LINE</strong>.<br><br>Звертайтесь:<br>
        <a href="mailto:burkotun.uno@gmail.com" class="mail-link">burkotun.uno@gmail.com</a></p>
        <button class="modal-close" onclick="closeModal()">Закрити</button>
    </div>

    <script>
        // --- PWA Встановлення ---
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block'; // Показуємо кнопку, якщо встановлення можливе
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    deferredPrompt = null;
                    installBtn.style.display = 'none';
                }
            }
        });

        // --- Управління модальними вікнами ---
        function showModal(type) {
            closeModal(); 
            if(type === 'info') document.getElementById('modalInfo').style.display = 'block';
            if(type === 'contact') document.getElementById('modalContact').style.display = 'block';
        }

        function closeModal() {
            document.querySelectorAll('.modal-info').forEach(m => m.style.display = 'none');
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal-info')) closeModal();
        }

        function setMode(m) {
            const engPanel = document.getElementById('engPanel');
            const btnStd = document.getElementById('btnStd');
            const btnEng = document.getElementById('btnEng');
            if(m === 'eng') {
                engPanel.classList.add('active'); btnEng.classList.add('active'); btnStd.classList.remove('active');
            } else {
                engPanel.classList.remove('active'); btnStd.classList.add('active'); btnEng.classList.remove('active');
            }
        }

        // --- Логіка Калькулятора ---
        let expr = "0";
        const disp = document.getElementById('display');

        function add(v) {
            if (expr === "0" && v !== '.') expr = v;
            else expr += v;
            update();
        }

        function clr() { expr = "0"; update(); }
        
        function back() {
            expr = expr.length > 1 ? expr.slice(0, -1) : "0";
            update();
        }

        function update() {
            // Відображення: замінюємо технічні символи на зрозумілі
            disp.innerText = expr.replace(/Math\./g, '').replace(/\*\*/g, '^');
        }

        function calculate() {
            try {
                // Використовуємо eval для обчислення рядка
                let res = eval(expr);
                // Округлення до 6 знаків після коми для уникнення проблем з плаваючою крапкою
                if (!Number.isInteger(res)) res = Math.round(res * 1000000) / 1000000;
                expr = res.toString();
                update();
            } catch (e) {
                disp.innerText = "Помилка";
                expr = "0";
            }
        }

        // Реєстрація Service Worker для PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
