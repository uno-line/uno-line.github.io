<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO | Калькулятор</title>
    <link rel="stylesheet" href="../simple-style.css">
    <style>
        body { 
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), 
                              url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1600&auto=format&fit=crop'); 
        }
        
        /* Щоб модальні вікна та меню не перекривали кнопки, якщо CSS не підтягнувся */
        .modal-info { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-info p { background: #1a1a1a; margin: 20% auto; padding: 20px; width: 80%; border-radius: 10px; border: 1px solid #444; }

        .calc-display {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #444;
            border-radius: 8px; padding: 20px; margin-bottom: 20px; text-align: right;
            font-size: 28px; color: #4da3ff; min-height: 80px; box-sizing: border-box;
        }

        .mode-switch { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .mode-btn { cursor: pointer; color: #888; font-size: 14px; text-transform: uppercase; border-bottom: 2px solid transparent; padding-bottom: 5px; }
        .mode-btn.active { color: #4da3ff; border-bottom-color: #4da3ff; }

        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { background: rgba(255,255,255,0.07); border: 1px solid #333; color: #fff; padding: 20px 5px; border-radius: 8px; font-size: 20px; cursor: pointer; }
        .calc-btn:active { background: #4da3ff; color: #000; }
        .btn-op { color: #4da3ff; font-weight: bold; }
        
        .eng-panel { display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
        .eng-panel.active { display: grid; }
    </style>
</head>
<body>

    <a href="../" class="home-link"><div class="home-icon">🏠</div></a>

    <div class="top-menu">
        <div class="menu-icon" onclick="document.querySelector('.menu-list').classList.toggle('active')">☰</div>
        <div class="menu-list">
            <a href="index.html">Оновити сторінку</a>
            <a href="../" style="color:#4da3ff">Повернутись до UNO</a>
        </div>
    </div>

    <div class="simple-container">
        <h1 class="brand-name">UNO</h1>
        <h2 class="tool-name">Калькулятор</h2>

        <div class="mode-switch">
            <span id="btnStd" class="mode-btn active" onclick="setMode('std')">Звичайний</span>
            <span id="btnEng" class="mode-btn" onclick="setMode('eng')">Інженерний</span>
        </div>

        <div id="display" class="calc-display">0</div>

        <div id="engPanel" class="eng-panel">
            <button class="calc-btn btn-op" onclick="addChar('Math.sin(')">sin</button>
            <button class="calc-btn btn-op" onclick="addChar('Math.cos(')">cos</button>
            <button class="calc-btn btn-op" onclick="addChar('Math.PI')">π</button>
            <button class="calc-btn btn-op" onclick="addChar('**')">^</button>
            <button class="calc-btn btn-op" onclick="addChar('Math.sqrt(')">√</button>
            <button class="calc-btn btn-op" onclick="addChar('Math.log(')">ln</button>
            <button class="calc-btn btn-op" onclick="addChar('(')">(</button>
            <button class="calc-btn btn-op" onclick="addChar(')')">)</button>
        </div>

        <div class="calc-grid">
            <button class="calc-btn" style="color:#ff4d4d" onclick="clearDisp()">C</button>
            <button class="calc-btn" onclick="backspace()">←</button>
            <button class="calc-btn btn-op" onclick="addChar('/')">/</button>
            <button class="calc-btn btn-op" onclick="addChar('*')">×</button>

            <button class="calc-btn" onclick="addChar('7')">7</button>
            <button class="calc-btn" onclick="addChar('8')">8</button>
            <button class="calc-btn" onclick="addChar('9')">9</button>
            <button class="calc-btn btn-op" onclick="addChar('-')">-</button>

            <button class="calc-btn" onclick="addChar('4')">4</button>
            <button class="calc-btn" onclick="addChar('5')">5</button>
            <button class="calc-btn" onclick="addChar('6')">6</button>
            <button class="calc-btn btn-op" onclick="addChar('+')">+</button>

            <button class="calc-btn" onclick="addChar('1')">1</button>
            <button class="calc-btn" onclick="addChar('2')">2</button>
            <button class="calc-btn" onclick="addChar('3')">3</button>
            <button class="calc-btn" onclick="calculate()" style="grid-row: span 2; background:#4da3ff; color:#000">=</button>

            <button class="calc-btn" style="grid-column: span 2;" onclick="addChar('0')">0</button>
            <button class="calc-btn" onclick="addChar('.')">.</button>
        </div>
    </div>

    <div class="simple-footer">
        <div class="footer-icon" onclick="openModal('info')">❓</div>
        <div class="footer-icon" onclick="openModal('contact')">✉️</div>
    </div>

    <div id="modalInfo" class="modal-info" onclick="closeModal()">
        <p onclick="event.stopPropagation()">Інженерний режим включає тригонометрію та логарифми. <br><br> <button onclick="closeModal()">OK</button></p>
    </div>
    <div id="modalContact" class="modal-info" onclick="closeModal()">
        <p onclick="event.stopPropagation()">Зворотній зв'язок:<br>burkotun.uno@gmail.com <br><br> <button onclick="closeModal()">Закрити</button></p>
    </div>

    <script>
        let currentExpr = "0";
        const displayElement = document.getElementById('display');

        // Функції модалок
        function openModal(id) {
            const m = id === 'info' ? 'modalInfo' : 'modalContact';
            document.getElementById(m).style.display = 'block';
        }
        function closeModal() {
            document.querySelectorAll('.modal-info').forEach(m => m.style.display = 'none');
        }

        // Режими
        function setMode(m) {
            const panel = document.getElementById('engPanel');
            const bS = document.getElementById('btnStd');
            const bE = document.getElementById('btnEng');
            if(m === 'eng') {
                panel.classList.add('active'); bE.classList.add('active'); bS.classList.remove('active');
            } else {
                panel.classList.remove('active'); bS.classList.add('active'); bE.classList.remove('active');
            }
        }

        // Математика
        function addChar(c) {
            if (currentExpr === "0" && c !== '.') currentExpr = c;
            else currentExpr += c;
            updateDisplay();
        }
        function clearDisp() { currentExpr = "0"; updateDisplay(); }
        function backspace() {
            currentExpr = currentExpr.length > 1 ? currentExpr.slice(0, -1) : "0";
            updateDisplay();
        }
        function updateDisplay() {
            displayElement.innerText = currentExpr.replace(/Math\./g, '').replace(/\*\*/g, '^');
        }
        function calculate() {
            try {
                let res = eval(currentExpr);
                currentExpr = (Math.round(res * 1000000) / 1000000).toString();
                updateDisplay();
            } catch (e) {
                displayElement.innerText = "Помилка";
                currentExpr = "0";
            }
        }
    </script>
</body>
</html>
